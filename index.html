function today(){return new Date().toISOString().slice(0,10);}
function todayLbl(){
  return S.lang==='ja'
    ? new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'})
    : new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function set(p){Object.assign(S,p);render();}
function getStn(code){return S.data.stations.find(s=>s.code===code)||{code,name:STN[code]?.name||'Station '+code,seat_limit:59};}
function getStaff(id){return S.data.staff.find(s=>s.id===id);}
function getRosterStn(staffId){const r=S.data.roster.find(r=>r.staff_id===staffId);return r?r.station_code:null;}
function getCI(staffId){return S.data.checkins.find(c=>c.staff_id===staffId);}
function stnRoster(code){return S.data.roster.filter(r=>r.station_code===code).map(r=>r.staff_id);}
function stnCI(code){return S.data.checkins.filter(c=>c.station_code===code).map(c=>c.staff_id);}

function toast(msg,ms=3000){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  S.toast=msg;S.toastTimer=setTimeout(()=>{S.toast='';render();},ms);render();
}

/* ===== DATA ===== */
async function reloadCI(){const{data}=await sb.from('checkins').select('*').eq('shift_date',today());S.data.checkins=data||[];}
async function reloadRoster(){const{data}=await sb.from('roster').select('*').eq('shift_date',today());S.data.roster=data||[];}
async function reloadStaff(){const{data}=await sb.from('staff').select('*').order('real_name');S.data.staff=data||[];}
async function reloadNotices(){const{data}=await sb.from('notices').select('*').order('created_at',{ascending:false}).limit(10);S.data.notices=data||[];}

async function loadAll(){
  S.screen='loading';render();
  try{
    const[st,sf,ro,ci,no]=await Promise.all([
      sb.from('stations').select('*').order('code'),
      sb.from('staff').select('*').order('real_name'),
      sb.from('roster').select('*').eq('shift_date',today()),
      sb.from('checkins').select('*').eq('shift_date',today()),
      sb.from('notices').select('*').order('created_at',{ascending:false}).limit(10)
    ]);
    S.data.stations=st.data||[];S.data.staff=sf.data||[];
    S.data.roster=ro.data||[];S.data.checkins=ci.data||[];S.data.notices=no.data||[];
    S.screen='home';
  }catch(e){S.screen='error';}
  render();subscribe();
}

function subscribe(){
  sb.channel('qcb6_live')
    .on('postgres_changes',{event:'*',schema:'public',table:'checkins'},async()=>{await reloadCI();render();})
    .on('postgres_changes',{event:'*',schema:'public',table:'roster'},async()=>{await reloadRoster();render();})
    .on('postgres_changes',{event:'*',schema:'public',table:'staff'},async()=>{await reloadStaff();render();})
    .on('postgres_changes',{event:'*',schema:'public',table:'notices'},async()=>{await reloadNotices();render();})
    .subscribe();
}

/* ===== SYNC ===== */
async function syncFromSheets(){
  S.syncing=true;toast(t('syncing'),15000);render();
  try{
    const oldRIds=S.data.roster.map(r=>r.id);
    if(oldRIds.length>0)await sb.from('roster').delete().in('id',oldRIds);
    S.data.roster=[];let totalRoster=0;
    for(const code of CODES){
      const cfg=STN[code];
      const res=await fetch(csvURL(cfg.gid));
      const text=await res.text();
      const parsed=Papa.parse(text.replace(/^\uFEFF/,''),{header:false,skipEmptyLines:true});
      const names=parsed.data.map(row=>(row[0]||'').replace(/^"|"$/g,'').trim()).filter(n=>n&&n.length>1);
      for(const name of names){
        let member=S.data.staff.find(s=>s.real_name.toUpperCase()===name.toUpperCase());
        if(!member){
          const maxB=S.data.staff.reduce((m,s)=>Math.max(m,s.badge_number),0);
          const{data,error}=await sb.from('staff').insert({badge_number:maxB+1,real_name:name,facebook_name:''}).select().single();
          if(!error&&data){S.data.staff.push(data);member=data;}else continue;
        }
        const{data:rData}=await sb.from('roster').insert({shift_date:today(),staff_id:member.id,station_code:code}).select().single();
        if(rData){S.data.roster.push(rData);totalRoster++;}
      }
    }
    await reloadStaff();
    S.lastSync=new Date().toLocaleTimeString();
    toast(t('syncDone')+totalRoster+t('staffLoaded'),4000);
  }catch(e){toast(t('syncFail')+': '+e.message,6000);}
  S.syncing=false;render();
}

/* ===== NOTICES ===== */
async function refreshNotices(){
  await reloadNotices();
  render();
  toast('🔄 Refreshed',1200);
}

async function postNotice(){
  const msg=S.noticeText.trim();if(!msg)return;
  const{data}=await sb.from('notices').insert({message:msg}).select().single();
  if(data)S.data.notices.unshift(data);
  S.noticeText='';S.showNoticeInput=false;render();
}
async function deleteNotice(id){
  await sb.from('notices').delete().eq('id',id);
  S.data.notices=S.data.notices.filter(n=>n.id!==id);render();
}

/* ===== PUSH ===== */
async function pushToSheets(){
  S.pushing=true;toast(t('pushing'),10000);render();
  try{
    const boardingLog=S.data.checkins.map(ci=>{
      const m=getStaff(ci.staff_id),stn=getStn(ci.station_code);
      return{realName:m?.real_name||'',facebook:m?.facebook_name||'',station:stn.name,time:new Date(ci.checked_in_at).toLocaleTimeString()};
    });
    const exceptions=[];
    CODES.forEach(s=>{
      const rIds=stnRoster(s),ciIds=stnCI(s);
      rIds.filter(id=>!ciIds.includes(id)).forEach(id=>{
        const m=getStaff(id),ci=getCI(id);
        exceptions.push({realName:m?.real_name||'',facebook:m?.facebook_name||'',assigned:getStn(s).name,boardedAt:ci?getStn(ci.station_code).name:'',type:ci?'Wrong Station':'No Show'});
      });
    });
    const summary={
      aB:stnCI('A').length,aA:stnRoster('A').length,bB:stnCI('B').length,bA:stnRoster('B').length,
      cB:stnCI('C').length,cA:stnRoster('C').length,total:S.data.checkins.length,
      wrong:exceptions.filter(e=>e.type==='Wrong Station').length,noShow:exceptions.filter(e=>e.type==='No Show').length
    };
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'push_report',date:today(),boardingLog,exceptions,summary})});
    toast(t('pushDone'),4000);
  }catch(e){toast(t('pushFail')+e.message,5000);}
  S.pushing=false;render();
}

/* ===== ACTIONS ===== */
async function doCheckIn(stnCode,staffId){
  const ex=S.data.checkins.find(c=>c.staff_id===staffId);
  if(ex){await sb.from('checkins').delete().eq('id',ex.id);S.data.checkins=S.data.checkins.filter(c=>c.id!==ex.id);}
  else{const{data}=await sb.from('checkins').insert({shift_date:today(),staff_id:staffId,station_code:stnCode}).select().single();if(data)S.data.checkins.push(data);}
  S.boardSrch='';render();
}
async function overrideCheckIn(stnCode,staffId){
  const m=getStaff(staffId);
  if(!confirm(t('confirmOverride')+(m?' ('+m.real_name+')':'')))return;
  await doCheckIn(stnCode,staffId);
}
async function clearStationColors(){
  if(!confirm('Clear yesterday\'s colors from Google Sheets station tabs?'))return;
  toast('🎨 Clearing colors...',8000);
  try{
    await fetch(SCRIPT_URL+'?action=clear_colors',{mode:'no-cors'});
    toast('✅ Colors cleared! Sheet is ready for today.',4000);
  }catch(e){toast('❌ Failed: '+e.message,4000);}
}

async function resetAllCI(){
  if(!confirm('Reset ALL check-ins for today? This cannot be undone.'))return;
  const ids=S.data.checkins.map(c=>c.id);
  if(ids.length>0)await sb.from('checkins').delete().in('id',ids);
  S.data.checkins=[];
  toast('✅ All check-ins reset',2000);
  render();
}

async function resetAllRoster(){
  if(!confirm('Clear today\'s roster? You will need to sync again.'))return;
  const ids=S.data.roster.map(r=>r.id);
  if(ids.length>0)await sb.from('roster').delete().in('id',ids);
  S.data.roster=[];
  toast('✅ Roster cleared',2000);
  render();
}

async function resetCI(stnCode){
  const stn=getStn(stnCode);
  if(!confirm(stn.name+' '+t('confirReset')))return;
  const ids=S.data.checkins.filter(c=>c.station_code===stnCode).map(c=>c.id);
  if(ids.length>0)await sb.from('checkins').delete().in('id',ids);
  S.data.checkins=S.data.checkins.filter(c=>c.station_code!==stnCode);render();
}
async function updateStn(code){
  const l=document.getElementById('sl'+code);if(!l)return;
  const limit=parseInt(l.value)||20,name=STN[code].name;
  await sb.from('stations').update({name,seat_limit:limit}).eq('code',code);
  const idx=S.data.stations.findIndex(s=>s.code===code);
  if(idx>=0)S.data.stations[idx]={...S.data.stations[idx],name,seat_limit:limit};
  toast(t('savedOk'),1500);render();
}
async function saveEdit(){
  const rn=S.editRN.trim(),fb=S.editFB.trim();if(!rn)return;
  await sb.from('staff').update({real_name:rn,facebook_name:fb}).eq('id',S.editId);
  const idx=S.data.staff.findIndex(s=>s.id===S.editId);
  if(idx>=0)S.data.staff[idx]={...S.data.staff[idx],real_name:rn,facebook_name:fb};
  S.editId=null;render();
}
async function removeStaff(id){
  if(!confirm(t('confirmRemove')))return;
  await sb.from('staff').delete().eq('id',id);
  S.data.staff=S.data.staff.filter(s=>s.id!==id);
  S.data.roster=S.data.roster.filter(r=>r.staff_id!==id);
  S.data.checkins=S.data.checkins.filter(c=>c.staff_id!==id);render();
}
function exportCSV(){
  let rows=['Real Name,Facebook Name,Assigned Station,Boarded,Boarded At,Time'];
  S.data.staff.forEach(m=>{
    const a=getRosterStn(m.id),ci=getCI(m.id);
    rows.push([m.real_name,m.facebook_name||'',a?getStn(a).name:'',ci?'YES':'NO',ci?getStn(ci.station_code).name:'',ci?new Date(ci.checked_in_at).toLocaleTimeString():''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
  a.download='QCB6_'+today()+'.csv';a.click();
}

/* ===== BOARDING ===== */
function scrBoard(){

  const filtered=srch?rosterStaff.filter(m=>{
    const name=m.real_name.toLowerCase();

          <div style="font-size:28px;font-weight:800;color:white;line-height:1.1">${cnt}</div>
        </div>
        <div style="flex:1;background:${full?'#FCEBEB':'rgba(255,255,255,.18)'};border-radius:10px;padding:8px 11px">
          <div style="font-size:9px;color:${full?'#A32D2D':'rgba(255,255,255,.7)'};letter-spacing:.5px;font-weight:700">${t('seatsLeft').toUpperCase()}</div>

        </div>

        </div>
      </div>
      ${full?`<div style="margin-top:9px;background:#FCEBEB;border-radius:8px;padding:9px;text-align:center;font-size:14px;color:#A32D2D;font-weight:800">⚠️ ${t('busFull')}</div>`:''}
    </div>

    <div style="padding:12px 1rem 6px">
      <div style="font-size:11px;color:#aaa;font-weight:700;letter-spacing:.5px;margin-bottom:6px">${t('searchLabel')}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="bsrch" placeholder="${t('searchPH')}" value="${esc(S.boardSrch)}"
          oninput="updateBoardSrch(this.value,'${code}')"

          style="flex:1;font-size:18px;font-weight:600;padding:12px 14px;border-radius:10px;border:2px solid ${cfg.bd};text-transform:uppercase" autofocus />
        ${S.boardSrch?`<button onclick="set({boardSrch:''})" style="padding:11px 14px;border-radius:10px;border:1px solid #ddd;background:#f5f5f0;font-size:16px;color:#888">✕</button>`:''}

    const active=S.boardSrch.toUpperCase()===l;
    h+=`<button onclick="set({boardSrch:'${l}'})" style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:1px solid ${has?cfg.bd:'#e8e8e8'};background:${active?cfg.bd:(has?cfg.bg:'#f7f7f5')};color:${active?'white':(has?cfg.dk:'#ccc')};font-size:12px;font-weight:700;margin-right:3px">${l}</button>`;

      <div style="display:flex;gap:8px">
        <button onclick="resetAllCI()" style="flex:1;padding:10px;border-radius:9px;border:1.5px solid #E24B4A;background:#FDECEA;color:#A32D2D;font-size:13px;font-weight:700">
          🗑 Reset All Check-ins<br><span style="font-size:11px;font-weight:400">全乗車記録をリセット</span>
        </button>
        <button onclick="resetAllRoster()" style="flex:1;padding:10px;border-radius:9px;border:1.5px solid #F5A623;background:#FFF8E6;color:#A0650A;font-size:13px;font-weight:700">
          🔄 Clear Roster<br><span style="font-size:11px;font-weight:400">ロスターをクリア</span>
        </button>
      </div>
      <button onclick="clearStationColors()" style="width:100%;margin-top:8px;padding:10px;border-radius:9px;border:1.5px solid #378ADD;background:#E6F1FB;color:#185FA5;font-size:13px;font-weight:700">
        🎨 Clear Yesterday's Colors from Google Sheets<br><span style="font-size:11px;font-weight:400">前日の色をシートから削除する</span>
      </button>
      <div style="font-size:11px;color:#aaa;margin-top:8px;text-align:center">Tomorrow's data resets automatically · 翌日は自動リセット</div>
    </div>

    <div style="padding:1rem;border-bottom:1px solid #f0f0ec">
      <div style="font-size:11px;color:#888;font-weight:700;letter-spacing:.5px;margin-bottom:4px">${t('seatTitle').toUpperCase()}</div>
      <div style="font-size:12px;color:#aaa;margin-bottom:10px">${t('seatSub')}</div>`;
  CODES.forEach(code=>{
    const cfg=STN[code],stn=getStn(code);
    h+=`<div style="background:${cfg.bg};border:1px solid ${cfg.bd};border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px">
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700;color:${cfg.dk}">${cfg.emoji} ${esc(cfg.name)}</div>
        <div style="font-size:12px;color:${cfg.tx};margin-top:2px">${stnRoster(code).length} ${t('assigned')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="number" id="sl${code}" value="${stn.seat_limit}" onblur="updateStn('${code}')"
          style="width:70px;background:white;border-color:${cfg.bd};text-align:center;font-size:18px;font-weight:700;padding:8px" />
        <span style="font-size:13px;color:${cfg.tx};font-weight:600">${t('seats')}</span>
      </div>
    </div>`;
  });

  h+=`</div>
    <div style="padding:1rem">
      <div style="font-size:11px;color:#888;font-weight:700;letter-spacing:.5px;margin-bottom:8px">${t('staffTitle').toUpperCase()} (${S.data.staff.length})</div>
      <div style="background:#EAF3DE;border:1px solid #639922;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#3B6D11">${t('staffTip')}</div>
      <input type="text" placeholder="${t('staffSearch')}" value="${esc(S.sSrch)}" oninput="set({sSrch:this.value})" style="margin-bottom:10px;background:#f7f7f5;border:1px solid #e0e0dc" />`;

  if(S.data.staff.length===0){
    h+=`<div style="border:1.5px dashed #ddd;border-radius:10px;padding:2rem;text-align:center;color:#bbb;font-size:13px">${t('noStaffYet')}</div>`;
  }else if(filtered.length===0){
    h+=`<div style="text-align:center;color:#bbb;font-size:13px;padding:1rem">—</div>`;
  }else{
    h+=`<div style="border:1px solid #e8e8e4;border-radius:10px;overflow:hidden">`;
    filtered.forEach((m,i)=>{
      const asgn=getRosterStn(m.id),cfg=asgn?STN[asgn]:null;
      const isEdit=S.editId===m.id;
      if(isEdit){
        h+=`<div style="padding:12px;background:#f7f7f5;${i<filtered.length-1?'border-bottom:1px solid #e0e0dc':''}">
          <div style="font-size:11px;color:#888;font-weight:700;margin-bottom:6px">${t('editing')}</div>
          <input type="text" value="${esc(S.editRN)}" oninput="S.editRN=this.value" placeholder="${t('realName')}" style="margin-bottom:6px" />
          <input type="text" value="${esc(S.editFB)}" oninput="S.editFB=this.value" placeholder="${t('fbName')}" style="margin-bottom:8px" />
          <div style="display:flex;gap:6px">
            <button onclick="saveEdit()" style="flex:2;padding:9px;border-radius:7px;border:none;background:#1a1a1a;color:white;font-size:14px;font-weight:700">${t('save')}</button>
            <button onclick="set({editId:null})" style="flex:1;padding:9px;border-radius:7px;border:1px solid #ddd;background:#f5f5f0;color:#666;font-size:13px">${t('cancel')}</button>
          </div>
        </div>`;
      }else{
        h+=`<div style="display:flex;align-items:center;padding:10px 12px;${i<filtered.length-1?'border-bottom:1px solid #f0f0ec':''}">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;color:#1a1a1a;font-weight:500">${esc(m.real_name)}</div>
            <div style="font-size:12px;color:#aaa">${m.facebook_name?'fb: '+esc(m.facebook_name):`<span style="color:#ddd">${t('noFB')}</span>`}</div>
          </div>
          ${cfg?`<span style="font-size:14px;margin-right:6px">${cfg.emoji}</span>`:''}
          <button onclick="set({editId:${m.id},editRN:'${m.real_name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}',editFB:'${(m.facebook_name||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'})" style="background:none;border:none;font-size:17px;padding:3px 4px;color:#aaa">✏️</button>
          <button onclick="removeStaff(${m.id})" style="background:none;border:none;font-size:17px;padding:3px 4px;color:#E24B4A">🗑</button>
        </div>`;
      }
    });
    h+=`</div>`;
  }
  h+=`</div><div style="height:2rem"></div></div>`;
  return h;
}

/* ===== CONFIRM BOARDING ===== */
async function confirmBoarding(code){
  const ids=[...S.boardSelected];
  if(ids.length===0)return;
  for(const id of ids){
    const ex=S.data.checkins.find(c=>c.staff_id===id);
    if(!ex){
      const{data}=await sb.from('checkins').insert({shift_date:today(),staff_id:id,station_code:code}).select().single();
      if(data)S.data.checkins.push(data);
    }
  }
  S.boardSelected=[];
  S.boardSrch='';
  render();
}

function toggleSelect(id){
  const idx=S.boardSelected.indexOf(id);
  if(idx>=0)S.boardSelected.splice(idx,1);
  else S.boardSelected.push(id);
  const el=document.getElementById('boardResults');
  if(el)el.innerHTML=buildBoardResults(S.as);
  updateConfirmBar();
}

function updateConfirmBar(){
  const bar=document.getElementById('confirmBar');
  if(!bar)return;
  const n=S.boardSelected.length;
  if(n>0){
    bar.style.display='block';
    bar.innerHTML=`<button onclick="confirmBoarding('${S.as}')"
      style="width:100%;padding:16px;border-radius:12px;border:none;background:#1a1a1a;color:white;font-size:17px;font-weight:800;letter-spacing:.2px">
      ✓ ${n} ${t('confirmBoard')}
    </button>`;
  }else{
    bar.style.display='none';
  }
}

/* ===== BOARD LIVE SEARCH (no full re-render) ===== */
function updateBoardSrch(val,code){
  S.boardSrch=val;
  const el=document.getElementById('boardResults');
  if(el)el.innerHTML=buildBoardResults(code);
}

function buildBoardResults(code){
  const cfg=STN[code];
  const ciIds=stnCI(code);
  const rIds=stnRoster(code);
  const srch=(S.boardSrch||'').trim().toLowerCase();
  const rosterStaff=S.data.staff.filter(m=>rIds.includes(m.id));
  const full=ciIds.length>=getStn(code).seat_limit;

  const filtered=srch?rosterStaff.filter(m=>{
    const name=m.real_name.toLowerCase();
    return srch.length<=2
      ? name.split(' ').some(w=>w.startsWith(srch))
      : name.includes(srch);
  }):[];

  let h='';

  if(!srch){
    const waiting=rosterStaff.filter(m=>!ciIds.includes(m.id));
    const done=rosterStaff.filter(m=>ciIds.includes(m.id));
    if(rosterStaff.length===0){
      h+=`<div style="text-align:center;padding:3rem 1rem;color:#bbb;font-size:14px">${t('noStaffSync')}</div>`;
    }else{
      if(waiting.length>0){
        h+=`<div style="font-size:10px;color:#888;letter-spacing:.5px;font-weight:700;padding:8px 0 4px">${t('waitingLabel')} (${waiting.length}) — ${t('typeSearch')}</div>`;
        waiting.forEach(m=>{
          const sel=S.boardSelected.includes(m.id);
          h+=`<button onclick="toggleSelect(${m.id})" style="width:100%;padding:12px 8px;border:none;border-bottom:1px solid #f0f0ec;background:${sel?cfg.bg:'transparent'};display:flex;align-items:center;gap:12px;text-align:left">
            <div style="width:30px;height:30px;border-radius:8px;flex-shrink:0;border:2px solid ${sel?cfg.bd:'#ccc'};background:${sel?cfg.bd:'white'};display:flex;align-items:center;justify-content:center">
              ${sel?`<span style="color:white;font-size:16px;font-weight:800">✓</span>`:''}
            </div>
            <div style="font-size:17px;font-weight:${sel?700:500};color:${sel?cfg.dk:'#333'}">${esc(m.real_name)}</div>
          </button>`;
        });
      }
      if(done.length>0){
        h+=`<div style="font-size:10px;color:#3B6D11;letter-spacing:.5px;font-weight:700;padding:12px 0 4px">✅ ${t('boardedLabel')} (${done.length})</div>`;
        done.forEach(m=>{
          h+=`<div style="padding:9px 0;border-bottom:1px solid #f0f0ec;display:flex;align-items:center;gap:10px;opacity:.5">
            <div style="flex:1"><div style="font-size:15px;color:#888;text-decoration:line-through">${esc(m.real_name)}</div></div>
            <div style="width:28px;height:28px;border-radius:6px;background:${cfg.bd};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:white;font-size:15px">✓</span></div>
          </div>`;
        });
      }
    }
  } else if(filtered.length===0){
    h+=`<div style="text-align:center;padding:2rem 1rem;color:#bbb;font-size:14px">${t('noMatch')} "<b>${esc(S.boardSrch)}</b>"<br><span style="font-size:12px">${t('tryOther')}</span></div>`;
  } else {
    h+=`<div style="font-size:10px;color:#888;letter-spacing:.5px;font-weight:700;padding:8px 0 6px">${t('results')} (${filtered.length})</div>`;
    filtered.forEach(m=>{
      const exCI=getCI(m.id);
      const alreadyHere=exCI&&exCI.station_code===code;
      const boardedElse=exCI&&exCI.station_code!==code;
      const assignedTo=getRosterStn(m.id);
      const wrongStn=!rIds.includes(m.id)&&assignedTo&&assignedTo!==code;

      if(alreadyHere){
        h+=`<div style="background:#EAF3DE;border:1.5px solid #639922;border-radius:10px;padding:12px 14px;margin-bottom:8px">
          <div style="font-size:11px;color:#3B6D11;font-weight:700;margin-bottom:3px">${t('alreadyHere')}</div>
          <div style="font-size:20px;font-weight:700;color:#1a1a1a">${esc(m.real_name)}</div>
          <button onclick="doCheckIn('${code}',${m.id})" style="margin-top:8px;width:100%;padding:9px;border-radius:8px;border:1.5px solid #639922;background:#f5f5f0;font-size:13px;color:#3B6D11;font-weight:600">${t('undo')}</button>
        </div>`;
      } else if(boardedElse){
        const wCfg=STN[exCI.station_code]||STN.A;
        h+=`<div style="background:#FFF8E6;border:1.5px solid #F5A623;border-radius:10px;padding:12px 14px;margin-bottom:8px">
          <div style="font-size:11px;color:#A0650A;font-weight:700;margin-bottom:3px">${t('alreadyElse')}</div>
          <div style="font-size:20px;font-weight:700;color:#1a1a1a">${esc(m.real_name)}</div>
          <div style="font-size:12px;color:#A0650A;margin-top:3px">→ ${wCfg.emoji} ${esc(wCfg.name)}</div>
        </div>`;
      } else if(wrongStn){
        const oCfg=STN[assignedTo]||STN.A;
        h+=`<div style="background:#FFF8E6;border:1.5px solid #F5A623;border-radius:10px;padding:12px 14px;margin-bottom:8px">
          <div style="font-size:11px;color:#A0650A;font-weight:700;margin-bottom:3px">${t('wrongStn')}</div>
          <div style="font-size:20px;font-weight:700;color:#1a1a1a">${esc(m.real_name)}</div>
          <div style="font-size:12px;color:#A0650A;margin-top:3px">${t('assignedTo')} ${oCfg.emoji} ${esc(oCfg.name)}</div>
          <button onclick="overrideCheckIn('${code}',${m.id})" style="margin-top:8px;width:100%;padding:9px;border-radius:8px;border:1.5px solid #F5A623;background:#FFF8E6;font-size:13px;color:#A0650A;font-weight:600">${t('override')}</button>
        </div>`;
      } else if(!full){
        const sel=S.boardSelected.includes(m.id);
        h+=`<button onclick="toggleSelect(${m.id})" style="width:100%;background:${sel?cfg.bg:'white'};border:2px solid ${sel?cfg.bd:'#e0e0dc'};border-radius:10px;padding:14px;margin-bottom:8px;text-align:left;display:flex;align-items:center;gap:12px">
          <div style="flex:1"><div style="font-size:20px;font-weight:700;color:${sel?cfg.dk:'#333'}">${esc(m.real_name)}</div></div>
          <div style="width:46px;height:46px;border-radius:10px;background:${sel?cfg.bd:'#f0f0ec'};border:2px solid ${sel?cfg.bd:'#e0e0dc'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            ${sel?`<span style="color:white;font-size:22px;font-weight:800">✓</span>`:`<span style="color:#ccc;font-size:22px">○</span>`}
          </div>
        </button>`;
      } else {
        h+=`<div style="background:${cfg.bg};border:1.5px solid ${cfg.bd};border-radius:10px;padding:12px 14px;margin-bottom:8px">
          <div style="font-size:20px;font-weight:700;color:${cfg.dk}">${esc(m.real_name)}</div>
          <div style="font-size:12px;color:#A32D2D;margin-top:4px;font-weight:700">${t('busFullCant')}</div>
        </div>`;
      }
    });
  }
  return h;
}

/* ===== RENDER ===== */
function render(){
  const app=document.getElementById('app');
  switch(S.screen){
    case 'loading': app.innerHTML=`<div style="padding:4rem;text-align:center;color:#aaa"><div style="font-size:40px;margin-bottom:1rem">🚌</div><div>${t('connecting')}</div></div>`; break;
    case 'error':   app.innerHTML=`<div style="padding:3rem;text-align:center"><div style="font-size:36px;margin-bottom:1rem">⚠️</div><div style="font-size:16px;color:#A32D2D;margin-bottom:1rem">${t('connError')}</div><button onclick="loadAll()" style="padding:10px 20px;border-radius:8px;border:none;background:#1a1a1a;color:white;font-size:14px">${t('retry')}</button></div>`; break;
    case 'home':    app.innerHTML=scrHome();    break;
    case 'board':   app.innerHTML=scrBoard();   break;
    case 'history': app.innerHTML=scrHistory(); break;
    case 'report':  app.innerHTML=scrReport();  break;
    case 'admin':   app.innerHTML=scrAdmin();   break;
    default:        app.innerHTML=scrHome();
  }
  if(S.toast){const t=document.createElement('div');t.className='toast';t.textContent=S.toast;document.body.appendChild(t);}
  else{document.querySelectorAll('.toast').forEach(t=>t.remove());}
  if(S.screen==='board'){const el=document.getElementById('bsrch');if(el)setTimeout(()=>el.focus(),80);}
}

loadAll();
</script>
</body>
</html>
